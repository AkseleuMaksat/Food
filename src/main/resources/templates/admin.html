<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout/main.html">
<div layout:fragment="akseleuFragment">
    <div class="row">
        <div class="col-12">
            <h1>Admin Panel</h1>

            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <span th:if="${param.error[0] == 'access_denied'}">You do not have permission to change ADMIN
                    roles.</span>
            </div>

            <h3 class="mt-4">Users</h3>
            <table class="table table-striped table-hover mt-3">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Roles</th>
                    <th>Actions (Moderator)</th>
                    <th>Actions (Admin)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.email}"></td>
                    <td>
                            <span th:each="role : ${user.roles}" th:text="${role.role} + ' '"
                                  class="badge bg-secondary me-1"></span>
                    </td>
                    <td>
                        <form th:action="@{/admin/users/{id}/change-role(id=${user.id})}" method="post"
                              style="display:inline;" th:if="${!user.hasRole('ROLE_MODERATOR')}">
                            <input type="hidden" name="roleName" value="ROLE_MODERATOR">
                            <input type="hidden" name="addRole" value="true">
                            <button type="submit" class="btn btn-sm btn-success">Promote to Moderator</button>
                        </form>
                        <form th:action="@{/admin/users/{id}/change-role(id=${user.id})}" method="post"
                              style="display:inline;" th:if="${user.hasRole('ROLE_MODERATOR')}">
                            <input type="hidden" name="roleName" value="ROLE_MODERATOR">
                            <input type="hidden" name="addRole" value="false">
                            <button type="submit" class="btn btn-sm btn-warning">Demote from Moderator</button>
                        </form>
                    </td>
                    <td>
                        <th:block th:if="${#authentication.name == 'admin@gmail.com'}">
                            <form th:action="@{/admin/users/{id}/change-role(id=${user.id})}" method="post"
                                  style="display:inline;" th:if="${!user.hasRole('ROLE_ADMIN')}">
                                <input type="hidden" name="roleName" value="ROLE_ADMIN">
                                <input type="hidden" name="addRole" value="true">
                                <button type="submit" class="btn btn-sm btn-primary">Promote to Admin</button>
                            </form>
                            <form th:action="@{/admin/users/{id}/change-role(id=${user.id})}" method="post"
                                  style="display:inline;"
                                  th:if="${user.hasRole('ROLE_ADMIN') and user.email != 'admin@gmail.com'}">
                                <input type="hidden" name="roleName" value="ROLE_ADMIN">
                                <input type="hidden" name="addRole" value="false">
                                <button type="submit" class="btn btn-sm btn-danger">Demote from Admin</button>
                            </form>
                        </th:block>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
